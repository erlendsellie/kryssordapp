<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kryssordapp</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Kryssordapp</h1>
    <p class="subtitle">Løs mini-kryssordet ved å fylle inn bokstaver.</p>

    <section class="controls">
      <button id="checkBtn">Sjekk svar</button>
      <button id="resetBtn">Nullstill</button>
      <p id="status" aria-live="polite"></p>
    </section>

    <section class="board-section">
      <div id="board" class="board" aria-label="Kryssord"></div>
    </section>

    <section class="clues">
      <div>
        <h2>Vannrett</h2>
        <ol id="acrossClues"></ol>
      </div>
      <div>
        <h2>Loddrett</h2>
        <ol id="downClues"></ol>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
